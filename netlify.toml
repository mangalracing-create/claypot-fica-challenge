# Netlify configuration for the Claypot FICA Challenge
# Static site — no build step required.

[build]
  publish = "."
  command = ""

# Pretty URL for the standalone big-screen leaderboard:  https://<site>/leaderboard
[[redirects]]
  from = "/leaderboard"
  to = "/leaderboard.html"
  status = 200

# Allow the camera on the registration screen.
[[headers]]
  for = "/*"
  [headers.values]
    Permissions-Policy = "camera=(self)"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Content-Type-Options = "nosniff"
