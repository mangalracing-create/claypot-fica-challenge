# Netlify configuration for the Claypot FICA Challenge
# Static site + one serverless function for the shared leaderboard (Netlify Blobs).

[build]
  publish = "."
  command = ""

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Pretty URL for the standalone big-screen leaderboard:  https://<site>/leaderboard
[[redirects]]
  from = "/leaderboard"
  to = "/leaderboard.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Content-Type-Options = "nosniff"
