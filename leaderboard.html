<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Claypot FICA Challenge — Leaderboard</title>
<style>
  :root{
    --wood-dark:#3a2416; --wood:#5a3a22; --wood-light:#7a4f2e;
    --chili:#d9342b; --chili-dark:#a81f1a; --gold:#f4b301; --gold-light:#ffd54a;
    --cream:#fff4e0; --green:#3fae52; --ink:#2b1a0e; --shadow:rgba(0,0,0,.35);
  }
  *{box-sizing:border-box;}
  html,body{height:100%;margin:0;}
  body{
    font-family:"Trebuchet MS","Segoe UI",system-ui,sans-serif;
    color:var(--cream);
    background:
      radial-gradient(circle at 20% 8%, #ffdf9e 0%, transparent 42%),
      radial-gradient(circle at 85% 92%, #ffb066 0%, transparent 42%),
      linear-gradient(160deg,#7a4f2e,#2e1c10);
    min-height:100vh;overflow-x:hidden;
  }
  .lanterns{position:fixed;top:0;left:0;right:0;height:46px;display:flex;justify-content:space-around;pointer-events:none;z-index:0;}
  .lantern{width:22px;height:28px;background:var(--chili);border-radius:50% 50% 45% 45%;box-shadow:inset -3px -3px 0 rgba(0,0,0,.15);animation:sway 3s ease-in-out infinite;}
  .lantern:nth-child(2n){background:var(--gold);animation-delay:.6s;}
  .lantern:nth-child(3n){animation-delay:1.2s;}
  @keyframes sway{0%,100%{transform:rotate(-5deg);}50%{transform:rotate(5deg);}}

  .wrap{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:26px 22px 30px;min-height:100vh;display:flex;flex-direction:column;}

  header.lb-head{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-top:26px;}
  .title-block{display:flex;align-items:center;gap:14px;}
  .title-block .pot{font-size:clamp(38px,6vw,64px);filter:drop-shadow(0 6px 8px rgba(0,0,0,.4));}
  h1{margin:0;font-size:clamp(24px,4vw,46px);color:var(--gold-light);text-shadow:2px 2px 0 var(--chili-dark),4px 4px 0 rgba(0,0,0,.3);letter-spacing:.5px;line-height:1;}
  .subtitle{font-size:clamp(12px,1.6vw,17px);opacity:.9;margin-top:4px;}

  .head-right{display:flex;flex-direction:column;align-items:flex-end;gap:8px;}
  .conn{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:bold;background:rgba(0,0,0,.32);border:1px solid var(--gold);border-radius:20px;padding:5px 12px;}
  .dot{width:10px;height:10px;border-radius:50%;background:var(--green);box-shadow:0 0 0 0 rgba(63,174,82,.6);animation:pulse 1.8s infinite;}
  .dot.local{background:var(--gold);}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(63,174,82,.6);}70%{box-shadow:0 0 0 8px rgba(63,174,82,0);}100%{box-shadow:0 0 0 0 rgba(63,174,82,0);}}
  .filters{display:flex;gap:8px;}
  .tab{cursor:pointer;border:2px solid var(--gold);background:transparent;color:var(--cream);font-family:inherit;font-weight:bold;padding:7px 22px;border-radius:22px;font-size:15px;}
  .tab.active{background:var(--gold);color:var(--ink);}

  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin:22px 0;}
  .stat{background:rgba(0,0,0,.34);border:2px solid rgba(255,255,255,.14);border-radius:18px;padding:16px 14px;text-align:center;box-shadow:0 8px 18px var(--shadow);}
  .stat.total{border-color:var(--gold);}
  .stat.perfect{border-color:var(--gold-light);}
  .stat.mid{border-color:#7be08e;}
  .stat.low{border-color:#ffb066;}
  .stat .num{font-size:clamp(30px,6vw,60px);font-weight:bold;color:var(--gold-light);line-height:1;text-shadow:2px 2px 0 rgba(0,0,0,.35);}
  .stat.mid .num{color:#7be08e;}
  .stat.low .num{color:#ffb066;}
  .stat .lbl{font-size:clamp(11px,1.5vw,15px);font-weight:bold;margin-top:8px;}
  .stat .sub{font-size:clamp(9px,1.2vw,12px);opacity:.75;margin-top:2px;}

  .fastest{text-align:center;font-size:clamp(13px,1.7vw,18px);margin:-4px 0 16px;min-height:1.3em;}
  .fastest b{color:var(--gold-light);}

  .list-head{display:flex;align-items:center;gap:14px;padding:6px 16px;font-size:12px;font-weight:bold;text-transform:uppercase;letter-spacing:.6px;opacity:.7;}
  .list-head .h-rank{width:64px;text-align:center;}
  .list-head .h-player{flex:1;}
  .list-head .h-score{width:110px;text-align:right;}
  .list-head .h-time{width:80px;text-align:right;}

  .rows{flex:1;display:flex;flex-direction:column;gap:9px;overflow-y:auto;padding:2px;}
  .row{display:flex;align-items:center;gap:14px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:10px 16px;animation:rowIn .35s ease;}
  @keyframes rowIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
  .row.top1{background:linear-gradient(90deg,rgba(244,179,1,.30),rgba(244,179,1,.08));border-color:var(--gold);}
  .row.top2{background:linear-gradient(90deg,rgba(200,200,200,.24),rgba(255,255,255,.05));border-color:#cfcfcf;}
  .row.top3{background:linear-gradient(90deg,rgba(205,127,50,.26),rgba(255,255,255,.05));border-color:#cd7f32;}
  .rank{width:64px;text-align:center;font-size:clamp(20px,3vw,30px);font-weight:bold;color:var(--gold-light);flex:0 0 64px;}
  .rank .rnum{font-size:.62em;opacity:.85;}
  .av{width:52px;height:52px;flex:0 0 52px;}
  .av img,.av .noimg{width:52px;height:52px;border-radius:50%;object-fit:cover;border:2px solid var(--gold);background:#2e2018;display:flex;align-items:center;justify-content:center;font-size:26px;}
  .player{flex:1;min-width:0;}
  .p-name{font-size:clamp(15px,2vw,22px);font-weight:bold;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .p-co{font-size:clamp(11px,1.4vw,14px);opacity:.72;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .p-rank-badge{display:inline-block;font-size:11px;font-weight:bold;padding:2px 8px;border-radius:10px;margin-top:3px;}
  .badge-master{background:rgba(244,179,1,.25);color:var(--gold-light);}
  .badge-chef{background:rgba(63,174,82,.22);color:#7be08e;}
  .badge-appr{background:rgba(255,176,102,.2);color:#ffb066;}
  .score{width:110px;text-align:right;font-size:clamp(20px,3vw,30px);font-weight:bold;color:var(--gold-light);flex:0 0 110px;}
  .score small{display:block;font-size:.4em;font-weight:normal;opacity:.65;color:var(--cream);}
  .time{width:80px;text-align:right;font-size:clamp(13px,1.6vw,17px);opacity:.85;flex:0 0 80px;}

  .empty{text-align:center;padding:60px 20px;font-size:clamp(15px,2vw,20px);opacity:.85;}
  .foot{text-align:center;font-size:12px;opacity:.6;margin-top:14px;}

  /* discreet admin control (bottom-right) */
  .admin-reset{position:fixed;right:14px;bottom:12px;z-index:50;font-family:inherit;font-size:12px;font-weight:bold;color:var(--cream);background:rgba(0,0,0,.42);border:1px solid rgba(255,255,255,.22);border-radius:20px;padding:6px 13px;cursor:pointer;opacity:.4;transition:opacity .2s,background .2s,border-color .2s;}
  .admin-reset:hover{opacity:1;background:var(--chili-dark);border-color:var(--gold);}
  .lb-toast{position:fixed;left:50%;bottom:56px;transform:translateX(-50%) translateY(18px);background:rgba(0,0,0,.86);border:2px solid var(--gold);color:var(--cream);padding:12px 22px;border-radius:14px;font-weight:bold;font-size:15px;opacity:0;transition:opacity .25s,transform .25s;z-index:60;pointer-events:none;max-width:80vw;text-align:center;}
  .lb-toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  .lb-toast.ok{border-color:var(--green);}
  .lb-toast.err{border-color:var(--chili);}

  @media (max-width:640px){
    .stats{grid-template-columns:repeat(2,1fr);}
    .list-head{display:none;}
    .score{width:84px;flex-basis:84px;}
    .time{display:none;}
  }
</style>
</head>
<body>
  <div class="lanterns" id="lanterns"></div>
  <div class="wrap">
    <header class="lb-head">
      <div class="title-block">
        <div class="pot">🍲</div>
        <div>
          <h1>Claypot FICA Leaderboard</h1>
          <div class="subtitle">Cook Faster. Archive Smarter. — live standings</div>
        </div>
      </div>
      <div class="head-right">
        <div class="conn"><span class="dot" id="connDot"></span><span id="connText">Connecting…</span></div>
        <div class="filters">
          <button class="tab active" data-f="today" onclick="setFilter('today',this)">Today</button>
          <button class="tab" data-f="all" onclick="setFilter('all',this)">All-Time</button>
        </div>
      </div>
    </header>

    <section class="stats">
      <div class="stat total"><div class="num" id="stTotal">0</div><div class="lbl">Total Players</div><div class="sub" id="stScope">today</div></div>
      <div class="stat perfect"><div class="num" id="stPerfect">0</div><div class="lbl">🏆 Perfect 2000</div><div class="sub">Claypot Masters</div></div>
      <div class="stat mid"><div class="num" id="stMid">0</div><div class="lbl">⭐ 1500 – 1999</div><div class="sub">Finance Chefs</div></div>
      <div class="stat low"><div class="num" id="stLow">0</div><div class="lbl">🍳 Under 1500</div><div class="sub">Kitchen Apprentices</div></div>
    </section>

    <div class="fastest" id="fastest"></div>

    <div class="list-head">
      <div class="h-rank">Rank</div>
      <div style="width:52px;flex:0 0 52px;"></div>
      <div class="h-player">Player</div>
      <div class="h-score">Score</div>
      <div class="h-time">Month-end</div>
    </div>
    <div class="rows" id="rows"></div>

    <div class="foot" id="foot"></div>
  </div>

  <button class="admin-reset" onclick="resetBoard()" title="Admin: reset the leaderboard for all screens">⟳ Reset board</button>
  <div class="lb-toast" id="lbToast"></div>

  <!-- Shared leaderboard data layer -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/store.js"></script>
  <script>
  "use strict";
  (function(){
    var l=document.getElementById('lanterns');
    for(var i=0;i<16;i++){var d=document.createElement('div');d.className='lantern';l.appendChild(d);}
  })();

  var filter='today';
  var currentList=[];

  function esc(s){ return (s||'').replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
  function isToday(ts){ var d=new Date(ts), n=new Date(); return d.toDateString()===n.toDateString(); }

  function tierBadge(score){
    if(score>=2000) return '<span class="p-rank-badge badge-master">🏆 Claypot Master</span>';
    if(score>=1500) return '<span class="p-rank-badge badge-chef">⭐ Finance Chef</span>';
    return '<span class="p-rank-badge badge-appr">🍳 Kitchen Apprentice</span>';
  }

  function setFilter(f, btn){
    filter=f;
    var tabs=document.querySelectorAll('.tab');
    for(var i=0;i<tabs.length;i++) tabs[i].classList.remove('active');
    if(btn) btn.classList.add('active');
    document.getElementById('stScope').textContent = (f==='today'?'today':'all-time');
    render(currentList);
  }

  function render(list){
    var filtered = (filter==='today') ? list.filter(function(e){return isToday(e.ts);}) : list.slice();
    filtered.sort(function(a,b){ return (b.score-a.score) || ((a.time||999)-(b.time||999)); });

    // ---- stats ----
    var total=filtered.length;
    var perfect=filtered.filter(function(e){return e.score>=2000;}).length;
    var mid=filtered.filter(function(e){return e.score>=1500 && e.score<2000;}).length;
    var low=filtered.filter(function(e){return e.score<1500;}).length;
    document.getElementById('stTotal').textContent=total;
    document.getElementById('stPerfect').textContent=perfect;
    document.getElementById('stMid').textContent=mid;
    document.getElementById('stLow').textContent=low;

    var rows=document.getElementById('rows');
    var fastest=document.getElementById('fastest');

    if(total===0){
      rows.innerHTML='<div class="empty">No scores '+(filter==='today'?'today ':'')+'yet — the pot is waiting! 🍲</div>';
      fastest.innerHTML='';
      return;
    }

    // ---- fastest month-end (bonus) ----
    var timed=filtered.filter(function(e){return typeof e.time==='number' && e.time>0;});
    if(timed.length){
      var fast=timed.slice().sort(function(a,b){return a.time-b.time;})[0];
      fastest.innerHTML='⚡ Fastest Month-End: <b>'+esc(fast.name)+'</b> — '+fast.time.toFixed(1)+'s';
    } else { fastest.innerHTML=''; }

    // ---- ranked list ----
    rows.innerHTML=filtered.map(function(e,i){
      var rank=i+1;
      var medal=['🥇','🥈','🥉'][i];
      var rankCell = medal ? medal+'<div class="rnum">#'+rank+'</div>' : '<span class="rnum" style="font-size:1em;">#'+rank+'</span>';
      var topCls = i===0?' top1':(i===1?' top2':(i===2?' top3':''));
      var av = e.photo ? '<img src="'+e.photo+'" alt=""/>' : '<div class="noimg">👤</div>';
      var co = e.company ? '<div class="p-co">'+esc(e.company)+'</div>' : '';
      var t  = (typeof e.time==='number') ? e.time.toFixed(1)+'s' : '—';
      return '<div class="row'+topCls+'">'
        + '<div class="rank">'+rankCell+'</div>'
        + '<div class="av">'+av+'</div>'
        + '<div class="player"><div class="p-name">'+esc(e.name||'Anonymous Chef')+'</div>'+co+'<div>'+tierBadge(e.score)+'</div></div>'
        + '<div class="score">'+e.score+'<small>/ 2000</small></div>'
        + '<div class="time">'+t+'</div>'
        + '</div>';
    }).join('');
  }

  function updateFoot(){
    var now=new Date();
    document.getElementById('foot').textContent='Updated '+now.toLocaleTimeString()+' · auto-refreshing live';
  }

  function showToast(msg, ok){
    var t=document.getElementById('lbToast');
    t.textContent=msg;
    t.className='lb-toast show '+(ok?'ok':'err');
    clearTimeout(t._t);
    t._t=setTimeout(function(){ t.className='lb-toast'; }, 2400);
  }

  // Admin: clear the board on EVERY screen (cross-device when cloud-synced).
  function resetBoard(){
    var pin=(window.CLAYPOT_ADMIN_PIN||'').toString();
    var scope=(window.ClaypotStore && ClaypotStore.mode()==='firebase') ? 'on all screens' : 'on this device';
    if(!window.confirm('Reset the leaderboard '+scope+'?\n\nThis permanently clears every score and cannot be undone.')) return;
    if(pin){
      var entered=window.prompt('Enter admin PIN to reset the board:');
      if(entered===null) return;                       // cancelled
      if(entered.trim()!==pin){ showToast('Incorrect PIN — board not reset.', false); return; }
    }
    Promise.resolve(window.ClaypotStore && ClaypotStore.clearAll())
      .then(function(){ showToast('Leaderboard reset. 🧹', true); })
      .catch(function(){ showToast('Reset failed — check connection.', false); });
  }
  window.resetBoard=resetBoard;

  // connection indicator
  function showMode(){
    var m = (window.ClaypotStore && ClaypotStore.mode()) || 'local';
    var dot=document.getElementById('connDot'), txt=document.getElementById('connText');
    if(m==='firebase'){ dot.className='dot'; txt.textContent='Live · Cloud synced'; }
    else { dot.className='dot local'; txt.textContent='Local mode (this device only)'; }
  }

  if(window.ClaypotStore){
    ClaypotStore.subscribe(function(list){
      currentList=list;
      render(list);
      updateFoot();
      showMode();
    });
  } else {
    document.getElementById('rows').innerHTML='<div class="empty">Leaderboard store failed to load. Check that <code>js/store.js</code> is present.</div>';
  }
  setInterval(updateFoot, 30000);
  </script>
</body>
</html>
